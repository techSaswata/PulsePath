name: CI

# Runs the type checker and the guardrail test suite on every push to main
# and on every pull request. Both steps run offline — no API keys required.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test
